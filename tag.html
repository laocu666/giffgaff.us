        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

        .tag-cloud{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:8px}

        .tag-pill:hover,.tag-pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
        .tag-count{font-size:.7rem;opacity:.7;margin-left:3px}
        .article-list{display:flex;flex-direction:column;gap:5px}
        .article-item{display:none;justify-content:space-between;align-items:flex-start;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;text-decoration:none;color:var(--text);transition:all .15s}
        .article-item:hover{border-color:var(--primary);transform:translateX(3px)}
        .article-title{font-size:.95rem;font-weight:500;word-break:break-word;line-height:1.4}
        .article-kws{font-size:.72rem;color:var(--muted);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
        .article-kws span::before{content:"#";opacity:.5}
        .article-tags{display:flex;gap:4px;flex-shrink:0;margin-left:10px}
        .tag{font-size:.65rem;color:#fff;padding:2px 6px;border-radius:4px;white-space:nowrap}
        .tag-main{background:var(--tag-bg)}.tag-esim{background:var(--tag-esim)}
        .not-found{display:none;text-align:center;padding:40px;color:var(--muted)}
        footer{text-align:center;margin-top:30px;padding-bottom:env(safe-area-inset-bottom,15px);font-size:.75rem;color:var(--muted)}
        @media(max-width:600px){body{padding:10px}}

    let curTag='All',curQ='';
    const counts={};
    posts.forEach(p=>p.tags.forEach(t=>counts[t]=(counts[t]||0)+1));
    const tc=document.getElementById('tagCloud');
    Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).forEach(tag=>{
        const s=document.createElement('span');s.className='tag-pill';
        s.innerHTML=`${tag}<span class="tag-count">${counts[tag]}</span>`;
        s.onclick=()=>filterTag(tag,s);tc.appendChild(s);
    });
    const list=document.getElementById('articleList');
    posts.forEach((p,i)=>{
        const a=document.createElement('a');a.href=p.url;a.className='article-item';
        const th=p.tags.map(t=>`<span class="tag ${TC[t]||'tag-main'}">${t}</span>`).join('');
        const kh=p.keywords.map(k=>`<span>${k}</span>`).join('');
        a.innerHTML=`<div><div class="article-title">${p.title}</div><div class="article-kws">${kh}</div></div><div class="article-tags">${th}</div>`;
        list.appendChild(a);
    });
    function render(){
        let n=0;
        document.querySelectorAll('.article-item').forEach((el,i)=>{
            const p=posts[i],q=curQ.toLowerCase();
            const ok=(curTag==='All'||p.tags.includes(curTag))&&(!q||p.title.toLowerCase().includes(q)||p.keywords.some(k=>k.toLowerCase().includes(q)));
            el.style.display=ok?'flex':'none';if(ok)n++;
        });
        document.getElementById('notFound').style.display=n?'none':'block';
    }
    function filterTag(tag,el){curTag=tag;document.querySelectorAll('.tag-pill').forEach(s=>s.classList.remove('active'));el.classList.add('active');render();}
    function doSearch(){curQ=document.getElementById('searchInput').value;render();}
    document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
    const urlQ=new URLSearchParams(location.search).get('q');
    if(urlQ){document.getElementById('searchInput').value=urlQ;curQ=urlQ;}
    render();
    </script>
